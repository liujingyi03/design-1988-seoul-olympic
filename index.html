<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1988 Seoul Olympic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
<header>
    <img src="images/seoul_olympic_logo.png" class="logo">

    <nav>
        <a href="index.html">HOME</a>
        <a href="logo.html">LOGO</a>
        <a href="hodori.html">HODORI</a>
        <a href="posters.html">POSTERS</a>
        <a href="impact.html">IMPACT</a>
    </nav>

</header>

<!-- 第一屏 -->
<section class="hero">

    <!-- 左边 -->
    <div class="hero-left">
        <h1>
            1988<br>
            SEOUL<br>
            OLYMPIC
        </h1>
    </div>
    <!-- 右边 -->
    <div class="hero-right">
        <img src="images/emblem.png" class="emblem">
        <img src="images/olympic_ring.png" class="rings">
        <img src="images/stadium.png" class="stadium">
        <div class="color-bar">

            <div class="blue"></div>
            <div class="yellow"></div>
            <div class="black"></div>
            <div class="green"></div>
            <div class="red"></div>
    </div>
</section>
 
<section class="intro-section">
    <p class="intro-title">
        1988 서울올림픽 엠블럼에 담긴 의미와 디자인을 소개합니다
    </p>

<div class="info-grid">
    <!-- logo -->
    <div class="info-card">

        <img src="images/seoul_olympic_logo.png" alt="logo">

        <div class="card-text">

            <h3>LOGO</h3>

            <p>
                1988 서울올림픽<br>
                엠블럼에 담긴 의미와<br>
                디자인을 소개합니다
            </p>

            <div class="arrow">→</div>

        </div>

</div>

    <!-- HODORI -->
    <div class="info-card">

        <img src="images/hodori_card2.png" alt="hodori">

        <div class="card-text">

            <h3>HODORI</h3>

            <p>
                귀여운 호돌이의 탄생<br>
                이아기로부터 다양한<br>
                활동 사례를 보여줍니다
            </p>

            <div class="arrow">→</div>

        </div>

</div>

    <!-- POSTERS -->
    <div class="info-card">

        <img src="images/poster_cover.jpg" alt="posters">

        <div class="card-text">

            <h3>POSTERS</h3>

            <p>
                공식 포스터의 다양한<br>
                정보 요소에 주목하며<br>
                감상할 수 있습니다
            </p>

            <div class="arrow">→</div>

        </div>

</div>
    <!-- IMPACT -->
    <div class="info-card">

        <img src="images/impact_city.jpg" alt="impact">

        <div class="card-text">

            <h3>IMPACT</h3>

            <p>
                서울을림픽이 한국<br>
                디자인과 세계에 미힌<br>
                영향을 살펴봅니다
            </p>

            <div class="arrow">→</div>

        </div>

    </div>

</div>


</section>
</body>
</html>
