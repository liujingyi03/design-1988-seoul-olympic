        <section class="text-area">
            <h1>서울올림픽 엠블럼</h1>

            <p>
                서울 올림픽 엠블럼은 삼태극 무늬가 특징입니다. 삼태극은 한국을 대표하는 전통 문양이자
                시각적 이미지입니다. 이 패턴은 부채나 한옥의 대문, 예술품, 민속 공예품에서 장식으로 널리 사용됩니다.
                서울 올림픽 엠블럼에는 구성과 원의 두 가지 형태의 패턴이 있습니다.
                구성의 움직임은 대한민국에 모여드는 세계의 사람들을 나타내며 세계가 화합하는 상징적으로 표현합니다.
                한편 원심의 움직임은 사람들의 영원한 행복과 번영을 찾아 나가는 정신을 나타냅니다.
            </p>
